<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub OAuth Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Connecting to GitHub...</h2>
        <div class="spinner"></div>
        <p id="status">Processing your GitHub authorization...</p>
    </div>

    <script>
        // Get the authorization code from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');

        if (error) {
            document.getElementById('status').textContent = `Authorization failed: ${error}`;
            document.getElementById('status').className = 'error';
            setTimeout(() => {
                window.close();
            }, 3000);
            return;
        }

        if (!code) {
            document.getElementById('status').textContent = 'No authorization code received';
            document.getElementById('status').className = 'error';
            setTimeout(() => {
                window.close();
            }, 3000);
            return;
        }

        // Send the code to the backend
        fetch('/api/github/oauth/callback', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                code: code,
                state: state
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                document.getElementById('status').textContent = `Successfully connected to GitHub as ${data.user.login}!`;
                document.getElementById('status').className = 'success';

                // Notify the parent window
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'GITHUB_OAUTH_SUCCESS',
                        user: data.user
                    }, window.location.origin);
                }

                setTimeout(() => {
                    window.close();
                }, 2000);
            } else {
                throw new Error(data.detail || 'Connection failed');
            }
        })
        .catch(error => {
            console.error('OAuth callback error:', error);
            document.getElementById('status').textContent = `Connection failed: ${error.message}`;
            document.getElementById('status').className = 'error';

            // Notify parent window of error
            if (window.opener) {
                window.opener.postMessage({
                    type: 'GITHUB_OAUTH_ERROR',
                    error: error.message
                }, window.location.origin);
            }

            setTimeout(() => {
                window.close();
            }, 3000);
        });
    </script>
</body>
</html>
